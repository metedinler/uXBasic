name: uXBasic Win64 CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test-win64:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup local win64 FreeBASIC toolchain
        run: tools\setup_win64_toolchain.bat

      - name: Add local FreeBASIC to PATH
        shell: pwsh
        run: |
          "${{ github.workspace }}\tools\FreeBASIC-1.10.1-win64" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build main (default)
        run: build.bat src\main.bas

      - name: Build manifest runner
        run: build.bat tests\run_manifest.bas

      - name: Build file I/O runtime runner
        run: build.bat tests\run_file_io_runtime.bas

      - name: Build file I/O exec AST runner
        run: build.bat tests\run_file_io_exec_ast.bas

      - name: Build file I/O exec AST negative runner
        run: build.bat tests\run_file_io_exec_ast_negative.bas

      - name: Build call runtime runner
        run: build.bat tests\run_call_exec.bas

      - name: Build user call exec AST runner
        run: build.bat tests\run_call_user_exec_ast.bas

      - name: Build memory VM runner
        run: build.bat tests\run_memory_vm.bas

      - name: Build memory exec AST runner
        run: build.bat tests\run_memory_exec_ast.bas

      - name: Build flow/io exec AST runner
        run: build.bat tests\run_flow_io_exec_ast.bas

      - name: Build IF exec AST runner
        run: build.bat tests\run_if_exec_ast.bas

      - name: Build console state exec AST runner
        run: build.bat tests\run_console_state_exec_ast.bas

      - name: Build CASE IS exec AST runner
        run: build.bat tests\run_case_is_exec_ast.bas

      - name: Build PRINT exec AST runner
        run: build.bat tests\run_print_exec_ast.bas

      - name: Build PRINT zone exec AST runner
        run: build.bat tests\run_print_zone_exec_ast.bas

      - name: Build INPUT exec AST runner
        run: build.bat tests\run_input_exec_ast.bas

      - name: Build RETURN exec AST runner
        run: build.bat tests\run_return_exec_ast.bas

      - name: Build JUMP exec AST runner
        run: build.bat tests\run_jump_exec_ast.bas

      - name: Build END exec AST runner
        run: build.bat tests\run_end_exec_ast.bas

      - name: Build namespace/module/main parse runner
        run: build.bat tests\run_namespace_module_main_parse.bas

      - name: Build class access/friend parse runner
        run: build.bat tests\run_class_access_friend_parse.bas

      - name: Build each exec runner
        run: build.bat tests\run_each_exec.bas

      - name: Build layout intrinsic runner
        run: build.bat tests\run_layout_intrinsics.bas

      - name: Build memory width semantics runner
        run: build.bat tests\run_memory_width_semantics.bas

      - name: Build memory stride fail-fast runner
        run: build.bat tests\run_memory_stride_failfast.bas

      - name: Build runtime intrinsic runner
        run: build.bat tests\run_runtime_intrinsics.bas

      - name: Build diagnostics log runner
        run: build.bat tests\run_diagnostics_log.bas

      - name: Validate test naming
        shell: pwsh
        run: ./tools/validate_test_naming.ps1

      - name: Build matrix (32/64)
        run: build_matrix.bat src\main.bas

      - name: Run manifest tests
        run: tests\run_manifest.exe

      - name: Run file I/O runtime tests
        run: tests\run_file_io_runtime.exe

      - name: Run file I/O exec AST tests
        run: tests\run_file_io_exec_ast.exe

      - name: Run file I/O exec AST negative tests
        run: tests\run_file_io_exec_ast_negative.exe

      - name: Run call runtime tests
        run: tests\run_call_exec.exe

      - name: Run user call exec AST tests
        run: tests\run_call_user_exec_ast.exe

      - name: Run memory VM tests
        run: tests\run_memory_vm.exe

      - name: Run memory exec AST tests
        run: tests\run_memory_exec_ast.exe

      - name: Run flow/io exec AST tests
        run: tests\run_flow_io_exec_ast.exe

      - name: Run IF exec AST tests
        run: tests\run_if_exec_ast.exe

      - name: Run console state exec AST tests
        run: tests\run_console_state_exec_ast.exe

      - name: Run CASE IS exec AST tests
        run: tests\run_case_is_exec_ast.exe

      - name: Run PRINT exec AST tests
        run: tests\run_print_exec_ast.exe

      - name: Run PRINT zone exec AST tests
        run: tests\run_print_zone_exec_ast.exe

      - name: Run INPUT exec AST tests
        run: tests\run_input_exec_ast.exe

      - name: Run RETURN exec AST tests
        run: tests\run_return_exec_ast.exe

      - name: Run JUMP exec AST tests
        run: tests\run_jump_exec_ast.exe

      - name: Run END exec AST tests
        run: tests\run_end_exec_ast.exe

      - name: Run namespace/module/main parse tests
        run: tests\run_namespace_module_main_parse.exe

      - name: Run class access/friend parse tests
        run: tests\run_class_access_friend_parse.exe

      - name: Run each exec tests
        run: tests\run_each_exec.exe

      - name: Run layout intrinsic tests
        run: tests\run_layout_intrinsics.exe

      - name: Run memory width semantics tests
        run: tests\run_memory_width_semantics.exe

      - name: Run memory stride fail-fast tests
        run: tests\run_memory_stride_failfast.exe

      - name: Run runtime intrinsic tests
        run: tests\run_runtime_intrinsics.exe

      - name: Run diagnostics log tests
        run: tests\run_diagnostics_log.exe

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uxbasic-win-build-artifacts
          if-no-files-found: error
          path: |
            src/main_32.exe
            src/main_64.exe
            tests/run_manifest.exe
            tests/run_file_io_runtime.exe
            tests/run_file_io_exec_ast.exe
            tests/run_file_io_exec_ast_negative.exe
            tests/run_call_exec.exe
            tests/run_call_user_exec_ast.exe
            tests/run_memory_vm.exe
            tests/run_memory_exec_ast.exe
            tests/run_flow_io_exec_ast.exe
            tests/run_if_exec_ast.exe
            tests/run_console_state_exec_ast.exe
            tests/run_case_is_exec_ast.exe
            tests/run_print_exec_ast.exe
            tests/run_print_zone_exec_ast.exe
            tests/run_input_exec_ast.exe
            tests/run_return_exec_ast.exe
            tests/run_jump_exec_ast.exe
            tests/run_end_exec_ast.exe
            tests/run_namespace_module_main_parse.exe
            tests/run_class_access_friend_parse.exe
            tests/run_each_exec.exe
            tests/run_layout_intrinsics.exe
            tests/run_memory_width_semantics.exe
            tests/run_memory_stride_failfast.exe
            tests/run_runtime_intrinsics.exe
            tests/run_diagnostics_log.exe
